<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K21 Calorie Tracker</title>
  <style>
    :root {
      --green: #2fa874;
      --green-deep: #1f8a5e;
      --orange: #f5963b;
      --orange-deep: #e07a1f;
      --bg: #f3f7f4;
      --card: #ffffff;
      --ink: #1f2a26;
      --muted: #5c6b64; /* darkened for WCAG AA contrast on the light bg */
      --line: #e4ece7;
      --danger: #e5564b;
      --shadow: 0 6px 24px rgba(31, 138, 94, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Visible keyboard focus ring for all interactive elements. */
    :focus-visible { outline: 3px solid rgba(47,168,116,0.55); outline-offset: 2px; border-radius: 4px; }
    button, .food-card, .snap-btn { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 18px 64px;
    }

    /* ---------- Header ---------- */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 22px;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--green-deep), var(--orange-deep));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .date { color: var(--muted); font-size: 0.95rem; font-weight: 500; }

    /* ---------- Date selector bar ---------- */
    .date-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .date-bar label { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    .date-bar input[type="date"] {
      width: auto;
      flex: 0 1 auto;
      padding: 9px 12px;
    }
    .date-bar .today-btn {
      border: 1px solid var(--green);
      background: #fff;
      color: var(--green-deep);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
    }
    .date-bar .today-btn:hover { background: rgba(47,168,116,0.08); }
    .date-bar .today-btn:disabled { opacity: 0.45; cursor: default; }

    /* ---------- Cards ---------- */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 18px;
    }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      color: var(--ink);
    }

    /* ---------- Daily Summary ---------- */
    .summary {
      background: linear-gradient(135deg, rgba(47,168,116,0.10), rgba(245,150,59,0.08));
    }
    .summary-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .calorie-num {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .calorie-num span { font-size: 1rem; font-weight: 600; color: var(--muted); }
    .goal-edit {
      text-align: right;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .goal-edit label { display: block; margin-bottom: 4px; }
    .goal-edit input {
      width: 90px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 0.95rem;
      text-align: right;
      color: var(--ink);
    }
    .progress {
      height: 14px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--orange));
      transition: width 0.4s ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .progress-meta .over { color: var(--danger); font-weight: 600; }

    /* ---------- Form ---------- */
    form .row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    label.field { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--ink);
      background: #fff;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47,168,116,0.15);
    }
    button.add {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--green), var(--green-deep));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease;
    }
    button.add:hover { filter: brightness(1.05); }
    button.add:active { transform: scale(0.99); }

    /* ---------- Snap Your Food (AI) ---------- */
    .snap-sub { color: var(--muted); font-size: 0.9rem; margin: -8px 0 14px; }
    .snap-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .snap-btn {
      flex: 1 1 140px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--orange), var(--orange-deep));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .snap-btn:hover { filter: brightness(1.05); }
    .snap-btn.outline {
      background: #fff;
      color: var(--orange-deep);
      border: 1px solid var(--orange);
    }
    .webcam-wrap { margin-top: 14px; }
    .webcam-wrap video {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 12px;
      background: #000;
      margin-bottom: 10px;
    }

    #snap-status { margin-top: 16px; }
    .snap-loading {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-weight: 600;
    }
    .snap-loading img, .result-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--line);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(245,150,59,0.06), rgba(47,168,116,0.06));
    }
    .result-head { display: flex; gap: 14px; align-items: flex-start; }
    .result-title { flex: 1; min-width: 0; }
    .result-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.01em; }
    .result-cal { font-weight: 700; color: var(--ink); margin-top: 2px; }
    .result-cal span { color: var(--muted); font-weight: 600; font-size: 0.85rem; }
    .stars { font-size: 1rem; letter-spacing: 1px; margin-top: 6px; }
    .stars .on { color: var(--orange); }
    .stars .off { color: var(--line); }
    .stars small { color: var(--muted); font-weight: 600; margin-left: 6px; font-size: 0.78rem; }
    .conf-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: capitalize;
      padding: 3px 10px;
      border-radius: 999px;
      margin-top: 8px;
    }
    .conf-high { background: rgba(47,168,116,0.15); color: var(--green-deep); }
    .conf-medium { background: rgba(245,150,59,0.18); color: var(--orange-deep); }
    .conf-low { background: rgba(229,86,75,0.14); color: var(--danger); }
    .result-detail { font-size: 0.9rem; color: var(--ink); margin-top: 12px; }
    .result-detail .lbl { color: var(--muted); font-weight: 700; font-size: 0.78rem; }
    .result-source { font-size: 0.75rem; color: var(--muted); margin-top: 14px; font-weight: 600; }
    .result-source .dot { color: var(--green); }
    .result-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .result-actions .add { flex: 1 1 160px; }
    .result-actions .ghost {
      flex: 0 0 auto;
      width: auto;
      padding: 12px 16px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .snap-error {
      background: rgba(229,86,75,0.1);
      color: var(--danger);
      border: 1px solid rgba(229,86,75,0.25);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ---------- Daily macros ---------- */
    .macros { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
    .macro { display: flex; flex-direction: column; }
    .macro .v { font-weight: 800; font-size: 1.05rem; letter-spacing: -0.01em; }
    .macro .k { font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .macro.p .v { color: var(--green-deep); }
    .macro.c .v { color: var(--orange-deep); }
    .macro.f .v { color: #7b48b0; }

    /* ---------- Daily summary insight ---------- */
    .insight-card { background: linear-gradient(135deg, rgba(47,168,116,0.08), rgba(245,150,59,0.06)); }
    .insight-row, .insight-tip { display: flex; gap: 10px; align-items: flex-start; font-size: 0.92rem; margin-bottom: 10px; }
    .insight-tip {
      margin: 6px 0 0; padding-top: 12px; border-top: 1px solid var(--line);
      color: var(--ink); font-size: 0.92rem;
    }
    .insight-ico { flex: 0 0 auto; font-size: 1.05rem; line-height: 1.3; }
    .insight-row .over { color: var(--danger); }
    .insight-empty { color: var(--muted); font-size: 0.9rem; }

    /* ---------- Food library ---------- */
    #food-search {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 14px;
    }
    #food-search:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(47,168,116,0.15); }
    .cat-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 14px; }
    .cat-chips button {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
    }
    .cat-chips button.active { background: var(--green); color: #fff; border-color: var(--green); }
    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      max-height: 360px;
      overflow-y: auto;
    }
    .food-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.08s ease, background 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .food-card:hover { border-color: var(--green); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(31,138,94,0.08); }
    .food-card:active { transform: scale(0.98); }
    .food-card.added { background: rgba(47,168,116,0.14); border-color: var(--green); }
    .food-name { font-weight: 700; font-size: 0.95rem; line-height: 1.25; }
    .food-meta { font-size: 0.76rem; color: var(--muted); font-weight: 600; }
    .food-cal { color: var(--green-deep); }
    .food-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .qty { display: inline-flex; align-items: center; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .qty .qbtn {
      width: 28px; height: 28px; border: none; background: #f3f7f4; color: var(--ink);
      font-size: 1rem; font-weight: 800; cursor: pointer; line-height: 1; padding: 0;
    }
    .qty .qbtn:hover { background: rgba(47,168,116,0.15); }
    .qty .qval { min-width: 26px; text-align: center; font-weight: 700; font-size: 0.9rem; }
    .add-hint { font-size: 0.72rem; color: var(--green-deep); font-weight: 700; }
    .food-empty { color: var(--muted); text-align: center; padding: 16px; font-size: 0.9rem; }

    /* ---------- Toast ---------- */
    #toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: var(--green-deep);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 18px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(31,42,38,0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 1000;
      max-width: 90vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---------- Meals list ---------- */
    .meal {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .meal:last-child { border-bottom: none; }
    @keyframes mealIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    .meal.enter { animation: mealIn 0.28s ease both; }
    .meal.leaving { opacity: 0; transform: translateX(16px); transition: opacity 0.2s ease, transform 0.2s ease; }

    /* Respect users who prefer reduced motion. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
    .meal-info { flex: 1; min-width: 0; }
    .meal-name { font-weight: 600; }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: capitalize;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(47,168,116,0.12);
      color: var(--green-deep);
      margin-top: 2px;
    }
    .badge.lunch { background: rgba(245,150,59,0.15); color: var(--orange-deep); }
    .badge.dinner { background: rgba(91,124,250,0.12); color: #4257c9; }
    .badge.snack { background: rgba(150,90,210,0.12); color: #7b48b0; }
    .meal-cal { font-weight: 700; white-space: nowrap; }
    .meal-cal span { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .meal-macros { font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-top: 3px; }
    .meal-macros b { font-weight: 800; }
    button.del {
      border: none;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 8px;
      line-height: 1;
    }
    button.del:hover { background: rgba(229,86,75,0.1); }
    .empty { color: var(--muted); font-size: 0.92rem; padding: 8px 0; text-align: center; }

    /* ---------- History chart ---------- */
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .history-head h2 { margin-bottom: 0; }
    .range-tabs {
      display: inline-flex;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .range-tabs button {
      width: auto;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .range-tabs button.active {
      background: #fff;
      color: var(--green-deep);
      box-shadow: 0 1px 3px rgba(31,42,38,0.12);
    }
    .chart-scroll { overflow-x: auto; padding-bottom: 4px; }
    .chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
      height: 160px;
      padding-top: 8px;
      min-width: 100%;
    }
    .bar-col {
      flex: 1 0 auto;
      min-width: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }
    .history-stats {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .history-stats .stat .num { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; }
    .history-stats .stat .lbl { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
    .history-stats .stat .num.macro-p { color: var(--green-deep); }
    .history-stats .stat .num.macro-c { color: var(--orange-deep); }
    .history-stats .stat .num.macro-f { color: #7b48b0; }
    .bar-val { font-size: 0.72rem; color: var(--muted); font-weight: 600; }
    .bar {
      width: 100%;
      max-width: 38px;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(180deg, var(--green), var(--green-deep));
      min-height: 3px;
      transition: height 0.4s ease;
    }
    .bar.today { background: linear-gradient(180deg, var(--orange), var(--orange-deep)); }
    .bar-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; }

    @media (max-width: 520px) {
      .wrap { padding: 16px 14px 56px; }
      .card { padding: 18px; }
      form .row { grid-template-columns: 1fr; }
      .calorie-num { font-size: 2.2rem; }
      /* Larger tap targets on touch screens */
      .qty .qbtn { width: 36px; height: 36px; }
      button.del { padding: 8px 12px; font-size: 1.3rem; }
      .food-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      header { margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>K21 Calorie Tracker</h1>
      <div class="date" id="today-date"></div>
    </header>

    <!-- Date selector -->
    <div class="date-bar">
      <label for="active-date">Logging for</label>
      <input type="date" id="active-date" />
      <button type="button" class="today-btn" id="today-btn">Today</button>
    </div>

    <!-- Daily Summary -->
    <section class="card summary">
      <div class="summary-top">
        <div>
          <div class="calorie-num"><span id="consumed">0</span></div>
          <div id="summary-label" style="color:var(--muted);font-size:0.9rem;font-weight:600;">calories today</div>
        </div>
        <div class="goal-edit">
          <label for="goal-input">Daily goal</label>
          <input type="number" id="goal-input" min="0" step="50" />
        </div>
      </div>
      <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-meta">
        <span id="progress-pct">0%</span>
        <span id="progress-remaining"></span>
      </div>
      <div class="macros" id="macros"></div>
    </section>

    <!-- Snap Your Food (AI) -->
    <section class="card">
      <h2>📸 Snap Your Food</h2>
      <p class="snap-sub">Estimate calories from a photo using AI — upload, snap, or paste (Ctrl+V).</p>
      <div class="snap-actions">
        <label class="snap-btn">
          ⬆ Upload from file
          <input type="file" id="food-file" accept="image/*" hidden />
        </label>
        <button type="button" class="snap-btn outline" id="webcam-btn">📷 Take a photo</button>
        <button type="button" class="snap-btn outline" id="paste-btn">📋 Paste image</button>
        <!-- Native camera fallback (works on mobile over http, unlike getUserMedia) -->
        <input type="file" id="food-camera" accept="image/*" capture="environment" hidden />
      </div>

      <div class="webcam-wrap" id="webcam-wrap" hidden>
        <video id="webcam-video" autoplay playsinline muted></video>
        <div class="snap-actions">
          <button type="button" class="snap-btn" id="capture-btn">Capture photo</button>
          <button type="button" class="snap-btn outline" id="webcam-cancel">Cancel</button>
        </div>
      </div>

      <div id="snap-status"></div>
    </section>

    <!-- Food Library -->
    <section class="card">
      <h2>🍱 Food library</h2>
      <p class="snap-sub">Pick a food and tap to add — adjust quantity with − / +.</p>
      <input type="search" id="food-search" placeholder="Search foods (e.g. banana, biryani)…" autocomplete="off" aria-label="Search the food library" />
      <div class="cat-chips" id="cat-chips"></div>
      <div class="food-grid" id="food-grid"></div>
    </section>

    <!-- Add Meal -->
    <section class="card">
      <h2>Add a meal</h2>
      <form id="meal-form">
        <div class="row">
          <div>
            <label class="field" for="meal-name">Meal</label>
            <input type="text" id="meal-name" placeholder="e.g. Grilled chicken salad" required />
          </div>
          <div>
            <label class="field" for="meal-cal">Calories</label>
            <input type="number" id="meal-cal" placeholder="450" min="0" step="1" required />
          </div>
          <div>
            <label class="field" for="meal-type">Type</label>
            <select id="meal-type">
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
              <option value="snack">Snack</option>
            </select>
          </div>
        </div>
        <button type="submit" class="add">+ Add meal</button>
      </form>
    </section>

    <!-- Today's Meals -->
    <section class="card">
      <h2 id="meals-heading">Today's meals</h2>
      <div id="meal-list"></div>
    </section>

    <!-- Daily Summary insight -->
    <section class="card insight-card" id="insight-card">
      <h2 id="insight-title">Daily summary</h2>
      <div id="insight" aria-live="polite"></div>
    </section>

    <!-- History -->
    <section class="card">
      <div class="history-head">
        <h2 id="history-title">Last 7 days</h2>
        <div class="range-tabs" id="range-tabs" role="group" aria-label="History range">
          <button type="button" data-range="7" class="active" aria-pressed="true">7d</button>
          <button type="button" data-range="14" aria-pressed="false">14d</button>
          <button type="button" data-range="30" aria-pressed="false">30d</button>
          <button type="button" data-range="all" aria-pressed="false">All</button>
        </div>
      </div>
      <div class="chart-scroll"><div class="chart" id="chart"></div></div>
      <div class="history-stats" id="history-stats"></div>
    </section>

    <footer style="text-align:center; margin-top:8px;">
      <a href="/admin" style="color:var(--muted); font-size:0.78rem; font-weight:600; text-decoration:none;">Admin</a>
    </footer>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    /*
     * K21 Calorie Tracker.
     *
     * State is kept in localStorage. Meal records carry an ISO date
     * (YYYY-MM-DD) so daily and weekly views are pure derivations of one list.
     * Any new input method (AI snap, food library) just builds a meal object via
     * createMeal() and calls addMeal() — no other code needs to change.
     */
    import { FOODS, FOOD_CATEGORIES } from './foods.js';

    const STORAGE_KEYS = { meals: 'k21.meals', goal: 'k21.goal' };
    const DEFAULT_GOAL = 2000;
    const MEAL_TYPES = ['breakfast', 'lunch', 'dinner', 'snack'];

    // ---------- Storage helpers ----------
    function loadMeals() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.meals);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveMeals(meals) {
      localStorage.setItem(STORAGE_KEYS.meals, JSON.stringify(meals));
    }

    function loadGoal() {
      const raw = localStorage.getItem(STORAGE_KEYS.goal);
      const n = Number(raw);
      return Number.isFinite(n) && n > 0 ? n : DEFAULT_GOAL;
    }

    function saveGoal(goal) {
      localStorage.setItem(STORAGE_KEYS.goal, String(goal));
    }

    // ---------- Date helpers ----------
    function isoDate(date = new Date()) {
      // Local YYYY-MM-DD (avoids UTC off-by-one from toISOString()).
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseIso(iso) {
      // Build a local Date from a YYYY-MM-DD string (no UTC shift).
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatLong(date) {
      // "1 June 2026" style.
      return date.toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric',
      });
    }

    // ---------- Meal model ----------
    const gramsOf = (v) => Math.max(0, Math.round(Number(v) || 0));

    function createMeal({ name, calories, type, date, protein, carbs, fat, health }) {
      return {
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        name: String(name).trim(),
        calories: Math.max(0, Math.round(Number(calories) || 0)),
        type: MEAL_TYPES.includes(type) ? type : 'snack',
        date: date || isoDate(),
        protein: gramsOf(protein),
        carbs: gramsOf(carbs),
        fat: gramsOf(fat),
        health: Math.max(0, Math.min(5, Math.round(Number(health) || 0))), // 1-5, 0 = unrated
      };
    }

    // ---------- App state ----------
    let meals = loadMeals();
    let goal = loadGoal();
    let selectedDate = isoDate(); // the date the UI is currently logging/viewing
    let historyRange = 7;         // chart window: 7 | 14 | 30 | 'all'
    let lastAddedId = null;       // newest meal id, so only it animates in

    function addMeal(meal) {
      meals.push(meal);
      saveMeals(meals);
      lastAddedId = meal.id;
      render();
    }

    function deleteMeal(id) {
      meals = meals.filter((m) => m.id !== id);
      saveMeals(meals);
      render();
    }

    function setGoal(value) {
      const n = Math.max(0, Math.round(Number(value) || 0));
      goal = n > 0 ? n : DEFAULT_GOAL;
      saveGoal(goal);
      render();
    }

    // ---------- Derivations ----------
    function mealsForDate(iso) {
      return meals.filter((m) => m.date === iso);
    }

    function totalFor(iso) {
      return mealsForDate(iso).reduce((sum, m) => sum + m.calories, 0);
    }

    function macrosFor(iso) {
      return mealsForDate(iso).reduce(
        (a, m) => ({
          protein: a.protein + (m.protein || 0),
          carbs: a.carbs + (m.carbs || 0),
          fat: a.fat + (m.fat || 0),
        }),
        { protein: 0, carbs: 0, fat: 0 },
      );
    }

    function daysBetween(startIso, endIso) {
      // Inclusive list of day objects from startIso through endIso.
      const days = [];
      const cur = parseIso(startIso);
      const end = parseIso(endIso);
      while (cur <= end) {
        const iso = isoDate(cur);
        days.push({ date: new Date(cur), iso, total: totalFor(iso), macros: macrosFor(iso) });
        cur.setDate(cur.getDate() + 1);
      }
      return days;
    }

    function earliestMealIso() {
      return meals.reduce((min, m) => (min && min <= m.date ? min : m.date), null);
    }

    function historyDays() {
      const todayIso = isoDate();
      if (historyRange === 'all') {
        const earliest = earliestMealIso();
        const startIso = earliest && earliest < todayIso ? earliest : todayIso;
        return daysBetween(startIso, todayIso);
      }
      const start = new Date();
      start.setDate(start.getDate() - (historyRange - 1));
      return daysBetween(isoDate(start), todayIso);
    }

    // ---------- Rendering ----------
    const els = {
      date: document.getElementById('today-date'),
      consumed: document.getElementById('consumed'),
      goalInput: document.getElementById('goal-input'),
      bar: document.getElementById('progress-bar'),
      pct: document.getElementById('progress-pct'),
      remaining: document.getElementById('progress-remaining'),
      list: document.getElementById('meal-list'),
      chart: document.getElementById('chart'),
      activeDate: document.getElementById('active-date'),
      todayBtn: document.getElementById('today-btn'),
      summaryLabel: document.getElementById('summary-label'),
      mealsHeading: document.getElementById('meals-heading'),
      historyTitle: document.getElementById('history-title'),
      historyStats: document.getElementById('history-stats'),
      rangeTabs: document.getElementById('range-tabs'),
      macros: document.getElementById('macros'),
      insight: document.getElementById('insight'),
      insightTitle: document.getElementById('insight-title'),
    };

    function isSelectedToday() {
      return selectedDate === isoDate();
    }

    function renderSummary() {
      const consumed = totalFor(selectedDate);
      els.consumed.textContent = consumed.toLocaleString();
      els.summaryLabel.textContent = isSelectedToday()
        ? 'calories today'
        : `calories on ${formatLong(parseIso(selectedDate))}`;
      if (document.activeElement !== els.goalInput) els.goalInput.value = goal;

      const pct = goal > 0 ? Math.round((consumed / goal) * 100) : 0;
      els.bar.style.width = `${Math.min(pct, 100)}%`;
      els.pct.textContent = `${pct}% of goal`;

      const remaining = goal - consumed;
      if (remaining >= 0) {
        els.remaining.textContent = `${remaining.toLocaleString()} cal left`;
        els.remaining.classList.remove('over');
      } else {
        els.remaining.textContent = `${Math.abs(remaining).toLocaleString()} cal over`;
        els.remaining.classList.add('over');
      }

      const m = macrosFor(selectedDate);
      els.macros.innerHTML = `
        <div class="macro p"><span class="v">${m.protein}g</span><span class="k">Protein</span></div>
        <div class="macro c"><span class="v">${m.carbs}g</span><span class="k">Carbs</span></div>
        <div class="macro f"><span class="v">${m.fat}g</span><span class="k">Fat</span></div>`;
    }

    function renderMeals() {
      const dayMeals = mealsForDate(selectedDate);
      els.mealsHeading.textContent = isSelectedToday()
        ? "Today's meals"
        : `Meals on ${formatLong(parseIso(selectedDate))}`;
      els.list.innerHTML = '';
      if (dayMeals.length === 0) {
        els.list.innerHTML = isSelectedToday()
          ? '<div class="empty">No meals logged yet today.</div>'
          : '<div class="empty">No meals logged for this date.</div>';
        return;
      }
      for (const meal of dayMeals) {
        const row = document.createElement('div');
        row.className = meal.id === lastAddedId ? 'meal enter' : 'meal';
        const hasMacros = (meal.protein || 0) + (meal.carbs || 0) + (meal.fat || 0) > 0;
        const macroLine = hasMacros
          ? `<div class="meal-macros">P <b>${meal.protein || 0}g</b> · C <b>${meal.carbs || 0}g</b> · F <b>${meal.fat || 0}g</b></div>`
          : '';
        row.innerHTML = `
          <div class="meal-info">
            <div class="meal-name"></div>
            <span class="badge ${meal.type}">${meal.type}</span>
            ${macroLine}
          </div>
          <div class="meal-cal">${meal.calories.toLocaleString()} <span>cal</span></div>
          <button class="del" title="Delete meal" aria-label="Delete ${meal.name || 'meal'}">&times;</button>
        `;
        row.querySelector('.meal-name').textContent = meal.name || 'Untitled';
        // Animate the row out, then remove it from state.
        row.querySelector('.del').addEventListener('click', () => {
          row.classList.add('leaving');
          setTimeout(() => deleteMeal(meal.id), 200);
        });
        els.list.appendChild(row);
      }
      lastAddedId = null; // consume the one-shot enter animation
    }

    function renderChart() {
      const days = historyDays();
      const max = Math.max(goal, ...days.map((d) => d.total), 1);
      const showValues = days.length <= 14; // value labels get cramped beyond this
      els.chart.innerHTML = '';
      for (const day of days) {
        const heightPct = Math.round((day.total / max) * 100);
        const col = document.createElement('div');
        col.className = 'bar-col';
        const isSelected = day.iso === selectedDate;
        const label = days.length <= 7
          ? day.date.toLocaleDateString('en-GB', { weekday: 'short' })
          : String(day.date.getDate());
        const m = day.macros;
        const tooltip = `${formatLong(day.date)}\n${day.total.toLocaleString()} cal`
          + `\nProtein ${m.protein}g · Carbs ${m.carbs}g · Fat ${m.fat}g`;
        col.innerHTML = `
          <div class="bar-val">${showValues && day.total ? day.total.toLocaleString() : ''}</div>
          <div class="bar ${isSelected ? 'today' : ''}" style="height:${heightPct}%"
               title="${tooltip}"></div>
          <div class="bar-label">${label}</div>
        `;
        els.chart.appendChild(col);
      }
      els.historyTitle.textContent = historyRange === 'all'
        ? `All history (${days.length} ${days.length === 1 ? 'day' : 'days'})`
        : `Last ${historyRange} days`;
      renderHistoryStats(days);
    }

    function renderHistoryStats(days) {
      const total = days.reduce((sum, d) => sum + d.total, 0);
      const loggedDays = days.filter((d) => d.total > 0).length;
      const avg = days.length ? Math.round(total / days.length) : 0;

      // Macro totals + per-day averages across the selected range.
      const macroSum = days.reduce(
        (a, d) => ({
          protein: a.protein + d.macros.protein,
          carbs: a.carbs + d.macros.carbs,
          fat: a.fat + d.macros.fat,
        }),
        { protein: 0, carbs: 0, fat: 0 },
      );
      const perDay = (g) => (days.length ? Math.round(g / days.length) : 0);

      els.historyStats.innerHTML = `
        <div class="stat"><div class="num">${total.toLocaleString()}</div><div class="lbl">total calories</div></div>
        <div class="stat"><div class="num">${avg.toLocaleString()}</div><div class="lbl">avg / day</div></div>
        <div class="stat"><div class="num">${loggedDays}</div><div class="lbl">days logged</div></div>
        <div class="stat"><div class="num macro-p">${macroSum.protein.toLocaleString()}g</div><div class="lbl">protein · ${perDay(macroSum.protein)}g/day</div></div>
        <div class="stat"><div class="num macro-c">${macroSum.carbs.toLocaleString()}g</div><div class="lbl">carbs · ${perDay(macroSum.carbs)}g/day</div></div>
        <div class="stat"><div class="num macro-f">${macroSum.fat.toLocaleString()}g</div><div class="lbl">fat · ${perDay(macroSum.fat)}g/day</div></div>
      `;
    }

    // Pick one actionable suggestion for tomorrow from today's data.
    function buildSuggestion({ consumed, goal, avgHealth, macros }) {
      if (goal > 0 && consumed > goal * 1.1) {
        return `You went ${(consumed - goal).toLocaleString()} cal over goal — try lighter portions or swap one item for a vegetable tomorrow.`;
      }
      if (avgHealth > 0 && avgHealth < 2.5) {
        return 'Most of today’s food was on the indulgent side — add fruit, vegetables, or a lean protein tomorrow.';
      }
      if (macros.protein < 50 && consumed > 300) {
        return 'Protein was a bit low — consider eggs, chicken, lentils, or yogurt tomorrow.';
      }
      if (goal > 0 && consumed < goal * 0.6) {
        return 'You ate well under your goal — make sure you’re fuelling enough across the day.';
      }
      return 'Nicely balanced today — keep this rhythm going tomorrow.';
    }

    function renderInsight() {
      const dayMeals = mealsForDate(selectedDate);
      const consumed = totalFor(selectedDate);
      const macros = macrosFor(selectedDate);
      const rated = dayMeals.filter((m) => m.health > 0);
      const avgHealth = rated.length
        ? rated.reduce((s, m) => s + m.health, 0) / rated.length
        : 0;

      els.insightTitle.textContent = isSelectedToday()
        ? 'Daily summary'
        : `Summary — ${formatLong(parseIso(selectedDate))}`;

      if (dayMeals.length === 0) {
        els.insight.innerHTML =
          '<p class="insight-empty">No meals logged for this day yet. Add a meal to see your summary and a tip for tomorrow.</p>';
        return;
      }

      const diff = goal - consumed;
      const goalLine = goal <= 0
        ? `${consumed.toLocaleString()} cal logged.`
        : diff >= 0
          ? `${consumed.toLocaleString()} / ${goal.toLocaleString()} cal — <b>${diff.toLocaleString()} under goal.</b>`
          : `${consumed.toLocaleString()} / ${goal.toLocaleString()} cal — <b class="over">${Math.abs(diff).toLocaleString()} over goal.</b>`;

      const healthLine = avgHealth > 0
        ? `Average healthiness <b>${avgHealth.toFixed(1)} / 5</b> across ${rated.length} rated ${rated.length === 1 ? 'item' : 'items'}.`
        : 'No healthiness ratings yet — add foods from the library or AI scan for a health score.';

      const tip = buildSuggestion({ consumed, goal, avgHealth, macros });

      els.insight.innerHTML = `
        <div class="insight-row"><span class="insight-ico" aria-hidden="true">🎯</span><span>${goalLine}</span></div>
        <div class="insight-row"><span class="insight-ico" aria-hidden="true">🥗</span><span>${healthLine}</span></div>
        <div class="insight-tip"><span class="insight-ico" aria-hidden="true">💡</span><span><b>Tomorrow:</b> ${tip}</span></div>`;
    }

    function render() {
      renderSummary();
      renderMeals();
      renderInsight();
      renderChart();
    }

    // ---------- Wiring ----------
    els.date.textContent = formatLong(new Date());
    els.goalInput.value = goal;
    els.activeDate.value = selectedDate;
    els.activeDate.max = isoDate(); // no logging into the future

    function setSelectedDate(iso) {
      if (!iso) return;
      selectedDate = iso > isoDate() ? isoDate() : iso;
      els.activeDate.value = selectedDate;
      els.todayBtn.disabled = isSelectedToday();
      render();
    }

    document.getElementById('meal-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('meal-name');
      const cal = document.getElementById('meal-cal');
      const type = document.getElementById('meal-type');
      const meal = createMeal({
        name: name.value,
        calories: cal.value,
        type: type.value,
        date: selectedDate,
      });
      if (!meal.name) return;
      addMeal(meal);
      name.value = '';
      cal.value = '';
      name.focus();
    });

    els.goalInput.addEventListener('change', (e) => setGoal(e.target.value));
    els.activeDate.addEventListener('change', (e) => setSelectedDate(e.target.value));
    els.todayBtn.addEventListener('click', () => setSelectedDate(isoDate()));

    els.rangeTabs.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-range]');
      if (!btn) return;
      const raw = btn.dataset.range;
      historyRange = raw === 'all' ? 'all' : Number(raw);
      els.rangeTabs.querySelectorAll('button').forEach((b) => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      renderChart();
    });

    els.todayBtn.disabled = isSelectedToday();
    render();

    /* ================= Snap Your Food (AI) ================= */
    const snap = {
      file: document.getElementById('food-file'),
      camera: document.getElementById('food-camera'),
      webcamBtn: document.getElementById('webcam-btn'),
      webcamWrap: document.getElementById('webcam-wrap'),
      video: document.getElementById('webcam-video'),
      captureBtn: document.getElementById('capture-btn'),
      cancelBtn: document.getElementById('webcam-cancel'),
      pasteBtn: document.getElementById('paste-btn'),
      status: document.getElementById('snap-status'),
    };
    let webcamStream = null;

    function guessMealType() {
      const h = new Date().getHours();
      if (h < 11) return 'breakfast';
      if (h < 16) return 'lunch';
      if (h < 21) return 'dinner';
      return 'snack';
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Could not read that image.'));
        img.src = src;
      });
    }

    // Downscale to keep the payload small and safely under the 4MB server limit.
    async function downscale(source, maxEdge = 1280, quality = 0.85) {
      const img = source instanceof HTMLImageElement ? source : await loadImage(source);
      const scale = Math.min(1, maxEdge / Math.max(img.width || maxEdge, img.height || maxEdge));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round((img.videoWidth || img.width) * scale));
      canvas.height = Math.max(1, Math.round((img.videoHeight || img.height) * scale));
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      return { dataUrl, base64: dataUrl.split(',')[1], mimeType: 'image/jpeg' };
    }

    function readAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Could not read that file.'));
        reader.readAsDataURL(file);
      });
    }

    async function fileToImage(file) {
      const dataUrl = await readAsDataUrl(file);
      try {
        // Preferred path: decode + downscale to a small JPEG.
        return await downscale(dataUrl);
      } catch {
        // Fallback for formats the browser can't render (e.g. HEIC from iPhones).
        // Gemini can still analyze the original bytes, so send them as-is.
        if (file.size > 4 * 1024 * 1024) {
          throw new Error('That image is over 4MB and could not be resized. Please pick a smaller one.');
        }
        const mimeType = /^image\//.test(file.type || '') ? file.type : 'image/jpeg';
        return { dataUrl, base64: dataUrl.split(',')[1], mimeType };
      }
    }

    function stars(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        html += `<span class="${i <= rating ? 'on' : 'off'}">★</span>`;
      }
      return `<span class="stars">${html}<small>${rating}/5 health</small></span>`;
    }

    function showLoading(previewUrl) {
      snap.status.innerHTML = `
        <div class="snap-loading">
          <img src="${previewUrl}" alt="food preview" />
          <div class="spinner"></div>
          <span>Analyzing your food…</span>
        </div>`;
    }

    function showError(message) {
      const div = document.createElement('div');
      div.className = 'snap-error';
      div.textContent = message || 'Something went wrong. Please try again.';
      snap.status.innerHTML = '';
      snap.status.appendChild(div);
    }

    function showResult(data, previewUrl) {
      const conf = ['low', 'medium', 'high'].includes(data.confidence) ? data.confidence : 'low';
      snap.status.innerHTML = `
        <div class="result">
          <div class="result-head">
            <img class="result-thumb" src="${previewUrl}" alt="food preview" />
            <div class="result-title">
              <div class="result-name"></div>
              <div class="result-cal">${data.estimated_calories.toLocaleString()} <span>est. calories</span></div>
              ${stars(data.healthiness_rating)}
              <div><span class="conf-badge conf-${conf}">${conf} confidence</span></div>
            </div>
          </div>
          <div class="result-detail"><span class="lbl">MACROS (EST.)</span><br>
            Protein ${data.protein_g || 0}g · Carbs ${data.carbs_g || 0}g · Fat ${data.fat_g || 0}g</div>
          ${data.portion_recommendation
            ? `<div class="result-detail"><span class="lbl">PORTION</span><br>${escapeHtml(data.portion_recommendation)}</div>` : ''}
          ${data.notes
            ? `<div class="result-detail"><span class="lbl">NOTES</span><br>${escapeHtml(data.notes)}</div>` : ''}
          ${data.model || data.provider
            ? `<div class="result-source"><span class="dot">●</span> Analyzed by ${escapeHtml(data.model || data.provider)}</div>` : ''}
          <div class="result-actions">
            <button type="button" class="add" id="snap-add">+ Add to log</button>
            <button type="button" class="ghost" id="snap-dismiss">Dismiss</button>
          </div>
        </div>`;
      snap.status.querySelector('.result-name').textContent = data.food_name;
      document.getElementById('snap-add').addEventListener('click', () => {
        // Add directly (carrying macros) — the manual form has no macro fields.
        addMeal(createMeal({
          name: data.food_name,
          calories: data.estimated_calories,
          type: guessMealType(),
          date: selectedDate,
          protein: data.protein_g,
          carbs: data.carbs_g,
          fat: data.fat_g,
          health: data.healthiness_rating,
        }));
        toast(`Added ${data.food_name} · ${data.estimated_calories.toLocaleString()} cal`);
        snap.status.innerHTML = '';
      });
      document.getElementById('snap-dismiss').addEventListener('click', () => {
        snap.status.innerHTML = '';
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    async function analyze(prepared) {
      showLoading(prepared.dataUrl);
      try {
        const resp = await fetch('/api/analyze-food', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: prepared.base64, mimeType: prepared.mimeType }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || 'Analysis failed. Please try again.');
        showResult(data, prepared.dataUrl);
      } catch (err) {
        showError(err.message);
      }
    }

    // ---- File upload / native camera ----
    async function handleFileInput(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const prepared = await fileToImage(file);
        await analyze(prepared);
      } catch (err) {
        showError(err.message);
      } finally {
        e.target.value = ''; // allow re-selecting the same file
      }
    }
    snap.file.addEventListener('change', handleFileInput);
    snap.camera.addEventListener('change', handleFileInput);

    // ---- Webcam ----
    function stopWebcam() {
      if (webcamStream) {
        webcamStream.getTracks().forEach((t) => t.stop());
        webcamStream = null;
      }
      snap.video.srcObject = null;
      snap.webcamWrap.hidden = true;
    }

    snap.webcamBtn.addEventListener('click', async () => {
      // Live webcam (getUserMedia) only works in a secure context (https/localhost).
      // On mobile over http it's unavailable, so fall back to the native camera input.
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        snap.camera.click();
        return;
      }
      try {
        webcamStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
        });
        snap.video.srcObject = webcamStream;
        snap.webcamWrap.hidden = false;
      } catch {
        // Permission denied or no device — fall back to the native camera picker.
        snap.camera.click();
      }
    });

    snap.captureBtn.addEventListener('click', async () => {
      if (!webcamStream) return;
      try {
        const prepared = await downscale(snap.video);
        stopWebcam();
        await analyze(prepared);
      } catch (err) {
        stopWebcam();
        showError(err.message);
      }
    });

    snap.cancelBtn.addEventListener('click', stopWebcam);

    // ---- Paste image (button + Ctrl+V) ----
    async function processImageBlob(blob) {
      if (!blob || !/^image\//.test(blob.type || '')) {
        showError('No image found. Copy an image first, then paste.');
        return;
      }
      try {
        const prepared = await fileToImage(blob); // Blobs work like Files here
        await analyze(prepared);
      } catch (err) {
        showError(err.message);
      }
    }

    // Button: read directly from the clipboard (needs https or localhost).
    snap.pasteBtn.addEventListener('click', async () => {
      if (!navigator.clipboard || !navigator.clipboard.read) {
        showError('This browser blocks clipboard reads here. Press Ctrl+V instead, or use Upload.');
        return;
      }
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const imageType = item.types.find((t) => t.startsWith('image/'));
          if (imageType) {
            await processImageBlob(await item.getType(imageType));
            return;
          }
        }
        showError('No image on the clipboard. Copy an image, then click Paste (or press Ctrl+V).');
      } catch {
        showError('Could not read the clipboard. Press Ctrl+V instead, or use Upload.');
      }
    });

    // Global Ctrl+V: catch a pasted image anywhere on the page.
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.type && item.type.startsWith('image/')) {
          const blob = item.getAsFile();
          if (blob) {
            e.preventDefault();
            processImageBlob(blob);
            return;
          }
        }
      }
    });

    /* ================= Toast ================= */
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    /* ================= Food library ================= */
    const lib = {
      search: document.getElementById('food-search'),
      chips: document.getElementById('cat-chips'),
      grid: document.getElementById('food-grid'),
    };
    let activeCat = 'All';

    // Rough healthiness (1-5) per food category, so library meals also feed the insight.
    const CATEGORY_HEALTH = {
      Fruits: 5, Vegetables: 5, Proteins: 4, Dairy: 4, 'Nuts & Seeds': 4,
      'Grains & Bread': 3, Indian: 3, Beverages: 3, Snacks: 2, 'Fast Food': 2, Sweets: 1,
    };

    function renderChips() {
      const cats = ['All', ...FOOD_CATEGORIES];
      lib.chips.innerHTML = '';
      for (const c of cats) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = c;
        btn.setAttribute('aria-pressed', String(c === activeCat));
        if (c === activeCat) btn.classList.add('active');
        btn.addEventListener('click', () => {
          activeCat = c;
          lib.search.value = '';
          renderChips();
          renderFoods();
        });
        lib.chips.appendChild(btn);
      }
    }

    function filteredFoods() {
      const q = lib.search.value.trim().toLowerCase();
      if (q) return FOODS.filter((f) => f.name.toLowerCase().includes(q));
      if (activeCat === 'All') return FOODS;
      return FOODS.filter((f) => f.category === activeCat);
    }

    function addFromLibrary(food, qty) {
      const meal = createMeal({
        name: qty > 1 ? `${food.name} ×${qty}` : food.name,
        calories: food.calories * qty,
        type: guessMealType(),
        date: selectedDate,
        protein: food.protein * qty,
        carbs: food.carbs * qty,
        fat: food.fat * qty,
        health: CATEGORY_HEALTH[food.category] || 3,
      });
      addMeal(meal);
      toast(`Added ${food.name}${qty > 1 ? ' ×' + qty : ''} · ${food.calories * qty} cal`);
    }

    function renderFoods() {
      const list = filteredFoods();
      lib.grid.innerHTML = '';
      if (list.length === 0) {
        lib.grid.innerHTML = '<div class="food-empty">No foods match your search.</div>';
        return;
      }
      for (const food of list) {
        const card = document.createElement('div');
        card.className = 'food-card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', `Add ${food.name}, ${food.calories} calories per ${food.serving}`);
        card.innerHTML = `
          <div>
            <div class="food-name"></div>
            <div class="food-meta">${escapeHtml(food.serving)} · <span class="food-cal">${food.calories} cal</span></div>
            <div class="food-meta">P ${food.protein} · C ${food.carbs} · F ${food.fat} (g)</div>
          </div>
          <div class="food-bottom">
            <span class="qty">
              <button type="button" class="qbtn" data-act="dec" aria-label="Decrease quantity of ${escapeHtml(food.name)}">−</button>
              <span class="qval">1</span>
              <button type="button" class="qbtn" data-act="inc" aria-label="Increase quantity of ${escapeHtml(food.name)}">+</button>
            </span>
            <span class="add-hint">tap to add</span>
          </div>`;
        card.querySelector('.food-name').textContent = food.name;

        const qval = card.querySelector('.qval');
        const getQty = () => Math.max(1, parseInt(qval.textContent, 10) || 1);

        // Quantity buttons adjust the count without adding (stop the card's add click).
        card.querySelectorAll('.qbtn').forEach((b) => {
          b.addEventListener('click', (e) => {
            e.stopPropagation();
            let q = getQty();
            q = b.dataset.act === 'inc' ? Math.min(99, q + 1) : Math.max(1, q - 1);
            qval.textContent = String(q);
          });
        });

        // Tapping (or pressing Enter/Space on) the card adds the chosen quantity.
        const commitAdd = () => {
          addFromLibrary(food, getQty());
          card.classList.add('added');
          setTimeout(() => card.classList.remove('added'), 350);
          qval.textContent = '1';
        };
        card.addEventListener('click', commitAdd);
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            commitAdd();
          }
        });

        lib.grid.appendChild(card);
      }
    }

    lib.search.addEventListener('input', renderFoods);
    renderChips();
    renderFoods();
  </script>
</body>
</html>
