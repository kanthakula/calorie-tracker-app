# Local development infrastructure for K21 Calorie Tracker.
#   docker compose up -d   → starts Postgres (and pgAdmin)
#   docker compose down    → stops them
#
# The Node API (packages/db / Prisma) connects via DATABASE_URL, which should
# match the credentials below. See .env.example.
services:
  postgres:
    image: postgres:16-alpine
    container_name: k21-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: k21
      POSTGRES_PASSWORD: k21_dev_password
      POSTGRES_DB: k21_calorie_tracker
    ports:
      - "5432:5432"
    volumes:
      - k21_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k21 -d k21_calorie_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional DB admin UI at http://localhost:5050 (login: admin@k21.local / admin).
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: k21-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@k21.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  k21_pgdata:
